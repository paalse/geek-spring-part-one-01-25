<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<th scope="col" th:fragment="sort_header (header, column)">[[${header}]]
    <a th:href="@{/product(page=${param.page}, size=${param.size},
                           productnameFilter=${param.productnameFilter}, priceFrom=${param.priceFrom}, priceTo=${param.priceTo},
                           sortField=${column})}"><i class="fa fa-sort-down"></i></a>
</th>

</html>
