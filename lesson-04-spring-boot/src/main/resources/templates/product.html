<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head.html :: head"/>

<body>

<nav th:replace="fragments/head.html :: navbar"/>

<div class="container">
    <div class="row py-2">
        <div class="col-12">
            <a class="btn btn-primary" th:href="@{/product/new}">Add Product</a>
        </div>

        <div class="col-12 mt-3">
            <form class="form-inline" th:method="get">

                <div class="form-group mb-2 mr-2">
                    <label for="productnameFilter" class="sr-only">Productname filter</label>
                    <input type="text" class="form-control" id="usernameFilter" th:value="${param.productnameFilter}"
                           name="productnameFilter" placeholder="Productname filter">
                </div>

                <div class="form-group mb-2 mr-2">
                    <label for="pricefromFilter" class="sr-only">Pricefrom filter</label>
                    <input type="BigNumber" class="form-control" id="pricefromFilter" th:value="${param.pricefromFilter}"
                           name="pricefromFilter" placeholder="Pricefrom filter">
                </div>

                <div class="form-group mb-2 mr-2">
                    <label for="pricetoFilter" class="sr-only">Priceto filter</label>
                    <input type="BigNumber" class="form-control" id="pricetoFilter" th:value="${param.pricetoFilter}"
                           name="pricetoFilter" placeholder="Priceto filter">
                </div>

                <button type="submit" class="btn btn-primary mb-2">Apply</button>
            </form>
        </div>

        <div class="col-12">
            <table class="table table-bordered my-2">
                <thead>
                <tr>
                    <th scope="col">Id</th>
                    <th scope="col">Name</th>
                    <th scope="col">Description</th>
                    <th scope="col">Price</th>
                    <th scope="col">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:unless="${products.empty}" th:each="product : ${products}" >
                    <th th:text="${product.id}" scope="row">1</th>
                    <td th:text="${product.productname}">ProductX</td>
                    <td th:text="${product.description}">ProductX</td>
                    <td th:text="${product.price}">0</td>
                    <td>
                        <a class="btn btn-success" th:href="@{/product/{id}(id = ${product.id})}"><i class="fas fa-edit"></i></a>
<!--                        <a class="btn btn-danger" th:href="@{/product/{id}/delete(id = ${product.id})}"><i class="far fa-trash-alt"></i></a>-->
                        <form class="d-inline" th:method="delete" th:action="@{/product/{id}(id = ${product.id})}">
                            <button type="submit" class="btn btn-danger"><i class="far fa-trash-alt"></i></button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${products.empty}">
                    <td colspan="5">No data </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="col-12">
        <nav aria-label="...">
            <ul class="pagination">
                <li class="page-item disabled">
                    <a class="page-link" href="#" tabindex="-1">Previous</a>
                </li>

                <li class="page-item"><a class="page-link" href="#">1</a></li>

                <li class="page-item active">
                    <a class="page-link" href="#">2 <span class="sr-only">(current)</span></a>
                </li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#">Next</a>
                </li>
            </ul>
        </nav>
        </div>
    </div>
</div>

<th:block th:replace="fragments/footer.html :: scripts"/>

</body>
</html>
